<script>








    function funcao_pdf() {
        var pegar_dados = document.getElementById('dados_modulos').innerHTML;
        var pegar_dados1 = document.getElementById('dados_longarinas').innerHTML;
        var pegar_dados2 = document.getElementById('dados_travessas').innerHTML;

        var janela = window.open('','','width=800,heigth=600');
        janela.document.write('<html> <head>');
        janela.document.write('<title>PDF</title> </head>');
        janela.document.write('<body');
        janela.document.write(pegar_dados, pegar_dados1, pegar_dados2);
        janela.document.write('/body></html>');
        janela.document.close();
        janela.print();

        }
